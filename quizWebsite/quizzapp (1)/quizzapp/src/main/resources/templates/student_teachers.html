<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Register / Manage Teachers</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body{background:#f8fafc}.page{max-width:1100px;margin:24px auto}.pill{padding:2px 10px;border-radius:999px;font-size:12px}</style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">Quiz App</a>
        <div class="ms-auto d-flex gap-2">
            <a class="btn btn-light btn-sm" href="/student/results">View My Results</a>
            <a class="btn btn-light btn-sm" href="/account/password">Change Password</a>
            <a class="btn btn-light btn-sm" href="/student">Back to Dashboard</a>
            <a class="btn btn-outline-light btn-sm" href="/logout">Logout</a>
        </div>
    </div>
</nav>

<main class="page">
    <h1 class="h3 fw-bold mb-3">Register / Manage My Teachers</h1>

    <div class="card shadow-sm">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-sm align-middle">
                    <thead><tr><th>Teacher</th><th>Status</th><th class="text-end">Action</th></tr></thead>
                    <tbody>
                    <tr th:each="t : ${allTeachers}">
                        <td th:text="${t.username}">teacher</td>

                        <td th:with="link=${linkByTeacherId[t.id]}">
                            <span class="pill bg-secondary text-white" th:if="${link == null}">Not requested</span>
                            <span class="pill bg-warning text-dark"  th:if="${link != null and link.status.name() == 'PENDING'}">Pending</span>
                            <span class="pill bg-success text-white" th:if="${link != null and link.status.name() == 'APPROVED'}">Approved</span>
                            <span class="pill bg-danger text-white"  th:if="${link != null and link.status.name() == 'DECLINED'}">Declined</span>
                        </td>

                        <td class="text-end" th:with="link=${linkByTeacherId[t.id]}">
                            <form th:if="${link == null}" th:action="@{|/student/teachers/request/${t.id}|}" method="post" class="d-inline">
                                <input th:if="${_csrf != null}" type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button class="btn btn-primary btn-sm">Request</button>
                            </form>
                            <span th:if="${link != null}" class="text-secondary">—</span>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
