<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Quiz Result — Quiz App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body{background:#f8fafc}.page{max-width:720px;margin:24px auto}</style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">Quiz App</a>
        <div class="ms-auto"><a class="btn btn-outline-light btn-sm" href="/logout">Logout</a></div>
    </div>
</nav>

<main class="page">
    <div class="card shadow-sm">
        <div class="card-body text-center">
            <h1 class="display-6 fw-semibold text-success">Quiz Submitted</h1>
            <p class="lead mt-2">Your score:</p>
            <div class="display-4 fw-bold mb-4"><span th:text="${score}">100</span>%</div>

            <div class="text-start p-3 bg-light border rounded mb-4" th:if="${feedback != null}">
                <h5 class="fw-bold text-primary">Performance Evaluation:</h5>
                <p class="mb-0 text-secondary" style="white-space: pre-line;" th:text="${feedback}">Feedback text...</p>
            </div>

            <div class="mt-4">
                <a href="/student/results" class="btn btn-primary me-2">View My Results</a>
                <a href="/student" class="btn btn-outline-secondary">Back to Dashboard</a>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
