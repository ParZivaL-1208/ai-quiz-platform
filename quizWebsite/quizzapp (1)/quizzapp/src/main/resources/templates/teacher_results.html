<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>All Results — Quiz App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body{background:#f8fafc}.page{max-width:1100px;margin:24px auto}</style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">Quiz App</a>
        <div class="ms-auto d-flex gap-2">
            <a class="btn btn-light btn-sm" href="/teacher/students">My Students</a>
            <a class="btn btn-light btn-sm" href="/teacher">Back to Dashboard</a>
            <a class="btn btn-outline-light btn-sm" href="/logout">Logout</a>
        </div>
    </div>
</nav>

<main class="page">
    <h1 class="h3 fw-bold mb-4">All Results (My Quizzes)</h1>

    <div class="card shadow-sm">
        <div class="card-body">

            <div class="alert alert-info" th:if="${attempts == null or #lists.isEmpty(attempts)}">
                No attempts have been recorded for your quizzes yet.
            </div>

            <div class="table-responsive" th:if="${attempts != null and !#lists.isEmpty(attempts)}">
                <table class="table table-sm align-middle table-hover">
                    <thead class="table-light">
                    <tr>
                        <th>Student</th>
                        <th>Quiz</th>
                        <th>Score</th>
                        <th>Date</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="a : ${attempts}">
                        <td th:text="${a.student.username}">student1</td>
                        <td th:text="${a.quiz.title}">Quiz</td>
                        <td>
                            <span class="badge"
                                  th:classappend="${a.score >= 70} ? 'bg-success' : 'bg-danger'"
                                  th:text="${a.score + ' %'}">0 %</span>
                        </td>
                        <td th:text="${#temporals.format(a.startedAt, 'yyyy-MM-dd HH:mm')}">2025-10-15</td>
                    </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
