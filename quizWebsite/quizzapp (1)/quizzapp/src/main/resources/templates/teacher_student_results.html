<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Student Results — Quiz App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body{background:#f8fafc}.page{max-width:900px;margin:24px auto}</style>
</head>
<body>
<!-- The Blue Header -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">Quiz App</a>
        <div class="ms-auto">
            <a class="btn btn-light btn-sm me-2" href="/teacher/students">Back to Roster</a>
            <a class="btn btn-light btn-sm me-2" href="/teacher">Dashboard</a>
            <a class="btn btn-outline-light btn-sm" href="/logout">Logout</a>
        </div>
    </div>
</nav>

<main class="page">
    <div class="d-flex align-items-center justify-content-between mb-4">
        <h1 class="h3 fw-bold mb-0">
            Results for: <span class="text-primary" th:text="${studentUsername}">StudentName</span>
        </h1>
        <a href="/teacher/students" class="btn btn-outline-secondary btn-sm">Back to List</a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">

            <div class="alert alert-warning" th:if="${#lists.isEmpty(attempts)}">
                This student hasn't taken any of your quizzes yet.
            </div>

            <div class="table-responsive" th:if="${!#lists.isEmpty(attempts)}">
                <table class="table table-sm align-middle table-hover">
                    <thead class="table-light">
                    <tr>
                        <th>Quiz Title</th>
                        <th>Score</th>
                        <th>Date Taken</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="a : ${attempts}">
                        <td th:text="${a.quiz.title}">Quiz Title</td>
                        <td>
                            <span class="badge"
                                  th:classappend="${a.score >= 70} ? 'bg-success' : 'bg-danger'"
                                  th:text="${a.score + ' %'}">80%</span>
                        </td>
                        <td th:text="${#temporals.format(a.startedAt, 'yyyy-MM-dd HH:mm')}">2025-10-15</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
