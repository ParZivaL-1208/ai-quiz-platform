<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My Results — Quiz App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body{background:#f8fafc}
        .page{max-width:1100px;margin:24px auto}
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">Quiz App</a>
        <div class="ms-auto d-flex gap-2">
            <a class="btn btn-light btn-sm" href="/student/teachers">Register / Manage Teachers</a>
            <a class="btn btn-light btn-sm" href="/account/password">Change Password</a>
            <a class="btn btn-light btn-sm" href="/student">Back to Dashboard</a>
            <a class="btn btn-outline-light btn-sm" href="/logout">Logout</a>
        </div>
    </div>
</nav>

<main class="page">
    <h1 class="h3 fw-bold mb-3">My Results</h1>

    <div class="alert alert-info" th:if="${attempts == null or #lists.isEmpty(attempts)}">
        You have no quiz attempts yet.
    </div>

    <div class="card shadow-sm" th:if="${attempts != null and !#lists.isEmpty(attempts)}">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-sm align-middle table-hover">
                    <thead class="table-light">
                    <tr>
                        <th>Quiz</th>
                        <th>Score</th>
                        <th>Date</th>
                        <th class="text-end">Details</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="a : ${attempts}">
                        <td class="fw-semibold" th:text="${a.quiz.title}">Quiz</td>
                        <td>
                            <span class="badge"
                                  th:classappend="${a.score >= 70} ? 'bg-success' : 'bg-danger'"
                                  th:text="${a.score + ' %'}">100%</span>
                        </td>
                        <td th:text="${#temporals.format(a.startedAt, 'yyyy-MM-dd HH:mm')}">2025-10-15</td>
                        <td class="text-end">
                            <a class="btn btn-sm btn-outline-primary"
                               th:href="@{|/student/results/${a.id}|}">
                                View Details
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
