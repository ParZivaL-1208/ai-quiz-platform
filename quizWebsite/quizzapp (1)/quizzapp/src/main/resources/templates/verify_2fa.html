<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><title>Verify Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body{background:#f8fafc}.page{max-width:400px;margin:60px auto}</style>
</head>
<body>
<main class="page">
    <div class="card shadow-sm">
        <div class="card-body text-center">
            <h3 class="mb-3">Two-Factor Authentication</h3>
            <p class="text-secondary">We sent a code to the test email.</p>

            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <form action="/verify-2fa" method="post">
                <input th:if="${_csrf != null}" type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <div class="mb-3">
                    <input name="code" class="form-control text-center fs-4" placeholder="000000" maxlength="6" required autofocus>
                </div>

                <button class="btn btn-primary w-100">Verify Code</button>
            </form>
        </div>
    </div>
</main>
</body>
</html>
