<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Change Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body{background:#f8fafc}.page{max-width:600px;margin:24px auto}</style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">Quiz App</a>
        <div class="ms-auto d-flex gap-2">
            <a class="btn btn-light btn-sm" href="/">Home</a>
            <a class="btn btn-outline-light btn-sm" href="/logout">Logout</a>
        </div>
    </div>
</nav>

<main class="page">
    <h2 class="h3 fw-bold mb-4">Change Password</h2>

    <div class="card shadow-sm">
        <div class="card-body">

            <form th:action="@{/account/password}" method="post" th:object="${form}">

                <div class="mb-3">
                    <label class="form-label">Old Password</label>
                    <input type="password" class="form-control" th:field="*{oldPassword}" required />
                </div>

                <div class="mb-3">
                    <label class="form-label">New Password</label>
                    <input type="password" class="form-control" th:field="*{newPassword}" required />
                </div>

                <div class="mb-3">
                    <label class="form-label">Confirm New Password</label>
                    <input type="password" class="form-control" th:field="*{confirmNewPassword}" required />
                </div>

                <button type="submit" class="btn btn-primary w-100">Update Password</button>

                <div class="mt-3 alert alert-success" th:if="${message}" th:text="${message}"></div>
                <div class="mt-3 alert alert-danger" th:if="${error}" th:text="${error}"></div>
            </form>
        </div>
    </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
