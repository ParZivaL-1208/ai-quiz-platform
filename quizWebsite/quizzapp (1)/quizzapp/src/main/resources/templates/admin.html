<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin — Quiz App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body{background:#f8fafc}.page{max-width:1100px;margin:24px auto}</style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">Quiz App</a>
        <div class="ms-auto d-flex gap-2">
            <a class="btn btn-light btn-sm" href="/account/password">Change Password</a>
            <a class="btn btn-outline-light btn-sm" href="/logout">Logout</a>
        </div>
    </div>
</nav>

<main class="page">
    <h1 class="h3 fw-bold mb-3">Admin Dashboard</h1>

    <div th:if="${ok}" class="alert alert-success" th:text="${ok}"></div>
    <div th:if="${err}" class="alert alert-danger" th:text="${err}"></div>

    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <h5 class="card-title mb-3">Create User</h5>
            <form th:action="@{/admin/users}" method="post" class="row g-2">
                <input th:if="${_csrf != null}" type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <div class="col-12 col-md-3">
                    <input class="form-control" name="username" placeholder="Username" required />
                </div>
                <div class="col-12 col-md-4">
                    <input class="form-control" type="email" name="email" placeholder="Email" required />
                </div>
                <div class="col-12 col-md-3">
                    <input class="form-control" type="text" name="password" placeholder="Password" required />
                </div>
                <div class="col-12 col-md-2">
                    <select class="form-select" name="role">
                        <option th:each="r : ${roles}" th:value="${r}" th:text="${r}">STUDENT</option>
                    </select>
                </div>
                <div class="col-12">
                    <button class="btn btn-primary">Add User</button>
                </div>
            </form>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <h5 class="card-title mb-3">All Users</h5>
            <div class="table-responsive">
                <table class="table table-sm align-middle">
                    <thead>
                    <tr>
                        <th>ID</th><th>Username</th><th>Email</th><th>Role</th><th class="text-end">Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="u : ${users}">
                        <td th:text="${u.id}">1</td>
                        <td th:text="${u.username}">alice</td>
                        <td th:text="${u.email}">a@example.com</td>
                        <td th:text="${u.role}">STUDENT</td>
                        <td class="text-end">
                            <form th:action="@{|/admin/users/${u.id}/delete|}" method="post" class="d-inline"
                                  onsubmit="return confirm('Delete user &quot;'+[[${u.username}]]+'&quot;?')">
                                <input th:if="${_csrf != null}" type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button class="btn btn-sm btn-danger">Delete</button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
