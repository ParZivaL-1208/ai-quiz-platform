<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Teacher Dashboard — Quiz App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <style>
        body{background:#f8fafc}
        .page{max-width:1100px;margin:24px auto}
        .q-card{background:#fff}
        .q-header{display:flex;align-items:center;justify-content:space-between}
        .q-index{font-weight:600}
        .folder-card { transition: transform 0.2s; cursor: pointer; }
        .folder-card:hover { transform: translateY(-3px); box-shadow: 0 .5rem 1rem rgba(0,0,0,.15)!important; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">Quiz App</a>
        <div class="ms-auto d-flex gap-2">
            <a class="btn btn-light btn-sm" href="/teacher/students">My Students</a>
            <a class="btn btn-light btn-sm" href="/teacher/results">All Results</a>
            <a class="btn btn-light btn-sm" href="/teacher/retakes">Retake Requests</a>
            <a class="btn btn-info btn-sm" href="/teacher/materials">Manage Materials</a>
            <a class="btn btn-warning btn-sm" href="/teacher/bank">Question Bank</a>
            <a class="btn btn-light btn-sm" href="/teacher/inbox">Inbox</a>
            <a class="btn btn-outline-light btn-sm" href="/logout">Logout</a>
        </div>
    </div>
</nav>
<main class="page">

    <h1 class="h3 fw-bold mb-4">Teacher Dashboard</h1>

    <div class="card shadow-sm q-card mb-4">
        <div class="card-body">
            <h5 class="card-title mb-3">Create Quiz</h5>

            <form th:action="@{/teacher/quiz}" method="post" id="quizForm">
                <input th:if="${_csrf != null}" type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <div class="mb-3">
                    <label class="form-label">Title</label>
                    <input class="form-control" name="title" placeholder="Quiz title" required>
                </div>

                <div id="questionsContainer" class="mb-3">
                    <div class="border rounded p-3 mb-3 bg-light-subtle question-block" data-index="0">
                        <div class="q-header mb-2">
                            <div class="q-index">Question <span class="q-num">1</span></div>
                            <button type="button" class="btn btn-outline-danger btn-sm" onclick="removeQuestion(this)" disabled>
                                Remove
                            </button>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Question text</label>
                            <textarea class="form-control" name="questions[0].text" rows="2" placeholder="Type the question" required></textarea>
                        </div>

                        <div class="row g-2">
                            <div class="col-md-3">
                                <label class="form-label">A</label>
                                <input class="form-control" name="questions[0].optionA" placeholder="Option A" required>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">B</label>
                                <input class="form-control" name="questions[0].optionB" placeholder="Option B" required>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">C</label>
                                <input class="form-control" name="questions[0].optionC" placeholder="Option C" required>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">D</label>
                                <input class="form-control" name="questions[0].optionD" placeholder="Option D" required>
                            </div>
                        </div>

                        <div class="mt-3">
                            <label class="form-label">Correct Option</label>
                            <select class="form-select" name="questions[0].correct" required>
                                <option value="A">A</option>
                                <option value="B">B</option>
                                <option value="C">C</option>
                                <option value="D">D</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="d-flex gap-2 align-items-center">
                    <button type="button" class="btn btn-outline-secondary" onclick="addQuestion()">+ Add Question</button>
                    <button type="button" class="btn btn-outline-info text-dark fw-semibold" data-bs-toggle="modal" data-bs-target="#bankModal">
                        Add question from question bank
                    </button>
                    <button type="submit" class="btn btn-primary ms-auto">Create Quiz</button>
                </div>
            </form>
        </div>
    </div>

    <div class="card shadow-sm q-card">
        <div class="card-body">
            <h5 class="card-title mb-3">Your Quizzes</h5>

            <div class="table-responsive">
                <table class="table table-sm align-middle">
                    <thead>
                    <tr><th>ID</th><th>Title</th><th>Questions</th></tr>
                    </thead>
                    <tbody>
                    <tr th:each="q : ${quizzes}">
                        <td th:text="${q.id}">1</td>
                        <td th:text="${q.title}">Quiz</td>
                        <td th:text="${#lists.size(q.questions)}">0</td>
                    </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </div>
</main>

<div class="modal fade" id="bankModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header bg-light">
                <h5 class="modal-title fw-bold" id="bankModalTitle">Select Questions from Bank</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body bg-light">

                <div id="modalFolderView" class="row g-3">
                    <div class="alert alert-secondary w-100 mx-2" th:if="${#maps.isEmpty(bankByChapter)}">
                        Question Bank is empty.
                    </div>

                    <div class="col-md-6" th:each="entry, stat : ${bankByChapter}">
                        <div class="card shadow-sm folder-card p-3 h-100 folder-click-handler"
                             th:data-index="${stat.index}"
                             th:data-title="${entry.key}">
                            <div class="d-flex align-items-center">
                                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="#ffc107" class="bi bi-folder-fill me-3" viewBox="0 0 16 16">
                                    <path d="M9.828 3h3.982a2 2 0 0 1 1.992 2.181l-.637 7A2 2 0 0 1 13.174 14H2.825a2 2 0 0 1-1.991-1.819l-.637-7a1.99 1.99 0 0 1 .342-1.31L.5 3a2 2 0 0 1 2-2h3.672a2 2 0 0 1 1.414.586l.828.828A2 2 0 0 0 9.828 3zm-8.322.12C1.72 3.042 1.95 3 2.19 3h5.396l-.707-.707A1 1 0 0 0 6.172 2H2.5a1 1 0 0 0-1 .981z"/>
                                </svg>
                                <h6 class="mb-0 fw-bold" th:text="${entry.key}">Chapter</h6>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="modalQuestionsView" style="display:none;">
                    <button class="btn btn-sm btn-outline-secondary mb-3" onclick="showModalFolders()">← Back to Folders</button>
                    <h5 id="modalActiveChapterName" class="mb-3 fw-bold text-primary"></h5>

                    <div th:each="entry, stat : ${bankByChapter}" th:id="'modal-chapter-' + ${stat.index}" class="modal-chapter-container" style="display:none;">
                        <div class="list-group">
                            <label class="list-group-item list-group-item-action d-flex align-items-start" th:each="q : ${entry.value}">
                                <input class="form-check-input me-3 mt-1 bank-q-checkbox" type="checkbox" th:value="${q.id}">
                                <div>
                                    <span class="fw-semibold" th:text="${q.text}">Question</span>
                                    <input type="hidden" th:id="'q-text-'+${q.id}" th:value="${q.text}">
                                    <input type="hidden" th:id="'q-optA-'+${q.id}" th:value="${q.options.size() > 0 ? q.options[0].text : ''}">
                                    <input type="hidden" th:id="'q-optB-'+${q.id}" th:value="${q.options.size() > 1 ? q.options[1].text : ''}">
                                    <input type="hidden" th:id="'q-optC-'+${q.id}" th:value="${q.options.size() > 2 ? q.options[2].text : ''}">
                                    <input type="hidden" th:id="'q-optD-'+${q.id}" th:value="${q.options.size() > 3 ? q.options[3].text : ''}">
                                    <input type="hidden" th:id="'q-correct-'+${q.id}" th:value="${(q.options.size() > 0 && q.options[0].correct) ? 'A' : ((q.options.size() > 1 && q.options[1].correct) ? 'B' : ((q.options.size() > 2 && q.options[2].correct) ? 'C' : 'D'))}">
                                </div>
                            </label>
                        </div>
                    </div>
                </div>

            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                <button type="button" class="btn btn-success" id="addSelectedBtn" style="display:none;" onclick="injectSelectedQuestions()">Add Selected to Quiz</button>
            </div>
        </div>
    </div>
</div>

<template id="questionTemplate">
    <div class="border rounded p-3 mb-3 bg-light-subtle question-block" data-index="__INDEX__">
        <div class="q-header mb-2">
            <div class="q-index">Question <span class="q-num">__NUM__</span></div>
            <button type="button" class="btn btn-outline-danger btn-sm" onclick="removeQuestion(this)">
                Remove
            </button>
        </div>

        <div class="mb-3">
            <label class="form-label">Question text</label>
            <textarea class="form-control" name="questions[__INDEX__].text" rows="2" placeholder="Type the question" required></textarea>
        </div>

        <div class="row g-2">
            <div class="col-md-3">
                <label class="form-label">A</label>
                <input class="form-control" name="questions[__INDEX__].optionA" placeholder="Option A" required>
            </div>
            <div class="col-md-3">
                <label class="form-label">B</label>
                <input class="form-control" name="questions[__INDEX__].optionB" placeholder="Option B" required>
            </div>
            <div class="col-md-3">
                <label class="form-label">C</label>
                <input class="form-control" name="questions[__INDEX__].optionC" placeholder="Option C" required>
            </div>
            <div class="col-md-3">
                <label class="form-label">D</label>
                <input class="form-control" name="questions[__INDEX__].optionD" placeholder="Option D" required>
            </div>
        </div>

        <div class="mt-3">
            <label class="form-label">Correct Option</label>
            <select class="form-select" name="questions[__INDEX__].correct" required>
                <option value="A">A</option>
                <option value="B">B</option>
                <option value="C">C</option>
                <option value="D">D</option>
            </select>
        </div>
    </div>
</template>

<script>
    let questionIndex = 1;

    function addQuestion() {
        const tpl = document.getElementById('questionTemplate').innerHTML;
        const html = tpl
            .replaceAll('__INDEX__', questionIndex)
            .replaceAll('__NUM__', questionIndex + 1);

        const wrapper = document.createElement('div');
        wrapper.innerHTML = html.trim();

        document.getElementById('questionsContainer').appendChild(wrapper.firstChild);
        questionIndex++;
        updateNumbers();
    }

    function removeQuestion(btn) {
        const block = btn.closest('.question-block');
        block.remove();
        reindexQuestions();
        updateNumbers();
    }

    function reindexQuestions() {
        const blocks = document.querySelectorAll('.question-block');
        blocks.forEach((blk, idx) => {
            blk.dataset.index = idx;
            blk.querySelectorAll('[name]').forEach(el => {
                el.name = el.name.replace(/questions\[\d+]/g, `questions[${idx}]`);
            });
        });
        questionIndex = blocks.length;
    }

    function updateNumbers() {
        document.querySelectorAll('.question-block .q-num')
            .forEach((el, idx) => el.textContent = idx + 1);

        const blocks = document.querySelectorAll('.question-block');
        const onlyOne = blocks.length === 1;
        blocks.forEach(b => {
            const btn = b.querySelector('button.btn-outline-danger');
            if (btn) btn.disabled = onlyOne;
        });
    }

    // NEW EVENT LISTENERS FOR FOLDERS
    document.addEventListener("DOMContentLoaded", function() {
        document.querySelectorAll('.folder-click-handler').forEach(folder => {
            folder.addEventListener('click', function() {
                const index = this.getAttribute('data-index');
                const title = this.getAttribute('data-title');

                document.getElementById('modalFolderView').style.display = 'none';
                document.getElementById('modalQuestionsView').style.display = 'block';
                document.getElementById('addSelectedBtn').style.display = 'block';
                document.getElementById('modalActiveChapterName').textContent = title;

                document.querySelectorAll('.modal-chapter-container').forEach(el => el.style.display = 'none');
                document.getElementById('modal-chapter-' + index).style.display = 'block';
            });
        });
    });

    function showModalFolders() {
        document.getElementById('modalFolderView').style.display = 'flex';
        document.getElementById('modalQuestionsView').style.display = 'none';
        document.getElementById('addSelectedBtn').style.display = 'none';
        document.getElementById('modalActiveChapterName').textContent = '';
    }

    document.getElementById('bankModal').addEventListener('hidden.bs.modal', function () {
        showModalFolders();
    });

    function injectSelectedQuestions() {
        const checkboxes = document.querySelectorAll('.bank-q-checkbox:checked');
        if(checkboxes.length === 0) return;

        checkboxes.forEach(cb => {
            const id = cb.value;
            const text = document.getElementById('q-text-' + id).value;
            const optA = document.getElementById('q-optA-' + id).value;
            const optB = document.getElementById('q-optB-' + id).value;
            const optC = document.getElementById('q-optC-' + id).value;
            const optD = document.getElementById('q-optD-' + id).value;
            const correct = document.getElementById('q-correct-' + id).value;

            const firstText = document.querySelector(`[name="questions[0].text"]`).value;
            let targetIdx;

            if (questionIndex === 1 && firstText.trim() === "") {
                targetIdx = 0;
            } else {
                addQuestion();
                targetIdx = questionIndex - 1;
            }

            document.querySelector(`[name="questions[${targetIdx}].text"]`).value = text;
            document.querySelector(`[name="questions[${targetIdx}].optionA"]`).value = optA;
            document.querySelector(`[name="questions[${targetIdx}].optionB"]`).value = optB;
            document.querySelector(`[name="questions[${targetIdx}].optionC"]`).value = optC;
            document.querySelector(`[name="questions[${targetIdx}].optionD"]`).value = optD;
            document.querySelector(`[name="questions[${targetIdx}].correct"]`).value = correct;

            cb.checked = false;
        });

        const modalEl = document.getElementById('bankModal');
        const modal = bootstrap.Modal.getInstance(modalEl);
        modal.hide();
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
