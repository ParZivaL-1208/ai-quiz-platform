<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Attempt Details — Quiz App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body{background:#f8fafc}
        .page{max-width:900px;margin:24px auto}
        .question-card { margin-bottom: 1rem; }
        .correct { border-left: 5px solid #198754; }
        .incorrect { border-left: 5px solid #dc3545; }
        .chapter-info {
            font-size: 0.9rem;
            font-weight: 500;
            color: #b00020;
            background-color: #fbebee;
            padding: 8px 12px;
            border-radius: 4px;
            margin-top: 12px;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">Quiz App</a>
        <div class="ms-auto"><a class="btn btn-outline-light btn-sm" href="/logout">Logout</a></div>
    </div>
</nav>

<main class="page">
    <h1 class="h4 fw-bold mb-1" th:text="${attempt.quiz.title}">Quiz Title</h1>
    <p class="lead mb-4">
        Your Score:
        <span class="badge" th:classappend="${attempt.score >= 70} ? 'bg-success' : 'bg-danger'" th:text="${attempt.score + ' %'}">100%</span>
    </p>

    <div class="card shadow-sm question-card"
         th:each="ans, iter : ${attempt.answers}"
         th:classappend="${ans.correct} ? 'correct' : 'incorrect'">

        <div class="card-body">
            <h6 class="fw-semibold mb-3">
                <span class="me-2 badge bg-secondary" th:text="${iter.index + 1}">1</span>
                <span th:text="${ans.question.text}">Question text</span>
            </h6>

            <p class="mb-1"><strong>Your Answer:</strong>
                <span th:text="${ans.selected.text}">Selected Option</span>
            </p>
            <div th:if="${!ans.correct}">
                <p class="text-success mb-2">
                    <strong>Correct Answer:</strong>
                    <span th:each="opt : ${ans.question.options}"
                          th:if="${opt.correct}"
                          th:text="${opt.text}">
                          Correct Option
                    </span>
                </p>
            </div>
            <div class="chapter-info">
                <strong>Source Material:</strong> This question is from
                <strong th:text="${ans.question.chapter}">01 Chapter.pdf</strong>.
            </div>

        </div>
    </div>

    <div class="card shadow-sm mt-4 mb-4 border-primary" th:if="${attempt.feedback != null}">
        <div class="card-body bg-light">
            <h5 class="fw-bold text-primary mb-3">Overall Performance Evaluation</h5>
            <p class="mb-0 text-dark" style="white-space: pre-line; font-size: 1.05rem;" th:text="${attempt.feedback}"></p>
        </div>
    </div>

    <div class="mt-4 d-flex gap-2">
        <a href="/student/results" class="btn btn-primary">Back to My Results</a>
        <a href="/student" class="btn btn-outline-secondary">Back to Dashboard</a>

        <form th:action="@{|/student/quiz/${attempt.quiz.id}/retake-request|}" method="post">
            <input th:if="${_csrf != null}" type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn btn-warning">Request Retake</button>
        </form>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
