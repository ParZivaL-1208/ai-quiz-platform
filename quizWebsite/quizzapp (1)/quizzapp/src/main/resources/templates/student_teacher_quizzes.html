<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="|Quizzes by ${teacher.username} — Quiz App|">Quizzes by Teacher</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body{background:#f8fafc}.page{max-width:1100px;margin:24px auto}</style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">Quiz App</a>
        <div class="ms-auto d-flex gap-2">
            <a class="btn btn-light btn-sm" href="/student/results">View My Results</a>
            <a class="btn btn-light btn-sm" href="/student">Back to Dashboard</a>
            <a class="btn btn-outline-light btn-sm" href="/logout">Logout</a>
        </div>
    </div>
</nav>

<main class="page">
    <h1 class="h3 fw-bold mb-3">Quizzes by <span th:text="${teacher.username}">Teacher</span></h1>

    <div class="card shadow-sm">
        <div class="card-body">
            <h5 class="card-title mb-3">Available Quizzes</h5>

            <div class="alert alert-info" th:if="${quizzes == null or #lists.isEmpty(quizzes)}">
                This teacher hasn't published any quizzes yet.
            </div>

            <div class="table-responsive" th:if="${quizzes != null and !#lists.isEmpty(quizzes)}">
                <table class="table table-sm align-middle">
                    <thead>
                    <tr>
                        <th>Title</th>
                        <th>Questions</th>
                        <th class="text-end">Action</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="q : ${quizzes}">
                        <td th:text="${q.title}">Quiz Title</td>
                        <td th:text="${#lists.size(q.questions)}">0</td>
                        <td class="text-end">
                            <a class="btn btn-primary btn-sm" th:href="@{|/student/quiz/${q.id}/start|}">Start</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
