<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My Students — Quiz App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body{background:#f8fafc}.page{max-width:1100px;margin:24px auto}</style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">Quiz App</a>
        <div class="ms-auto d-flex gap-2">
            <a class="btn btn-light btn-sm" href="/teacher/results">All Results</a>
            <a class="btn btn-light btn-sm" href="/teacher">Back to Dashboard</a>
            <a class="btn btn-outline-light btn-sm" href="/logout">Logout</a>
        </div>
    </div>
</nav>

<main class="page">
    <h1 class="h3 fw-bold mb-4">My Students (Approved)</h1>

    <div class="card shadow-sm">
        <div class="card-body">

            <div class="alert alert-warning" th:if="${students == null or #lists.isEmpty(students)}">
                No approved students yet. Check your <a href="/teacher/inbox" class="alert-link">Inbox</a> for pending requests.
            </div>

            <div class="table-responsive" th:if="${students != null and !#lists.isEmpty(students)}">
                <table class="table table-sm align-middle table-hover">
                    <thead class="table-light">
                    <tr>
                        <th>Username</th>
                        <th class="text-end">Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="s : ${students}">
                        <td>
                            <span class="fw-semibold" th:text="${s.username}">student1</span>
                        </td>
                        <td class="text-end">
                            <a class="btn btn-sm btn-primary"
                               th:href="@{|/teacher/students/${s.username}/results|}">
                                View Results
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
