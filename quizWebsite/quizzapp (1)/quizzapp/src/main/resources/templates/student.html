<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Student — Quiz App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body{background:#f8fafc}.page{max-width:1100px;margin:24px auto}</style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">Quiz App</a>
        <div class="ms-auto d-flex gap-2">
            <a class="btn btn-light btn-sm" href="/student/teachers">Register / Manage Teachers</a>
            <a class="btn btn-light btn-sm" href="/student/results">View My Results</a>
            <a class="btn btn-light btn-sm" href="/account/password">Change Password</a>
            <a class="btn btn-outline-light btn-sm" href="/logout">Logout</a>
        </div>
    </div>
</nav>

<main class="page">
    <h1 class="h3 fw-bold mb-3">Student Dashboard</h1>

    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <h5 class="card-title mb-3">My Approved Teachers</h5>
            <p class="text-secondary" th:if="${teachers == null or #lists.isEmpty(teachers)}">
                You don’t have any approved teachers yet. Go to <a href="/student/teachers">Register / Manage Teachers</a>.
            </p>

            <div class="list-group" th:if="${teachers != null and !#lists.isEmpty(teachers)}">
                <a th:each="t : ${teachers}"
                   th:href="@{|/student/teacher/${t.id}/quizzes|}"
                   class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">

                    <span th:text="${t.username}">teacher</span>
                    <span class="badge bg-primary rounded-pill">View Quizzes</span>
                </a>
            </div>

        </div>
    </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
