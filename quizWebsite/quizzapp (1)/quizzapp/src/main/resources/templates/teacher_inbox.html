<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Inbox — Quiz App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body{background:#f8fafc}.page{max-width:1100px;margin:24px auto}</style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">Quiz App</a>
        <div class="ms-auto d-flex gap-2">
            <a class="btn btn-light btn-sm" href="/teacher/students">My Students</a>
            <a class="btn btn-light btn-sm" href="/teacher/results">All Results</a>
            <a class="btn btn-light btn-sm" href="/teacher">Back to Dashboard</a>
            <a class="btn btn-outline-light btn-sm" href="/logout">Logout</a>
        </div>
    </div>
</nav>

<main class="page">
    <h1 class="h3 fw-bold mb-4">Teacher Inbox</h1>

    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <div class="d-flex align-items-center justify-content-between">
                <h5 class="card-title mb-3">Student Join Requests</h5>
                <span class="badge bg-secondary"
                      th:text="${(joinRequests != null) ? #lists.size(joinRequests) : 0}">0</span>
            </div>

            <div class="alert alert-info"
                 th:if="${joinRequests == null or #lists.isEmpty(joinRequests)}">
                No pending student join requests.
            </div>

            <div class="table-responsive"
                 th:if="${joinRequests != null and !#lists.isEmpty(joinRequests)}">
                <table class="table table-sm align-middle">
                    <thead>
                    <tr><th>Student</th><th>Request ID</th><th class="text-end">Actions</th></tr>
                    </thead>
                    <tbody>
                    <tr th:each="r : ${joinRequests}">
                        <td th:text="${(r != null && r.student != null) ? r.student.username : '—'}">student1</td>
                        <td th:text="${(r != null) ? r.id : ''}">—</td>
                        <td class="text-end">
                            <form th:action="@{|/teacher/requests/${r.id}/approve|}" method="post" class="d-inline">
                                <input th:if="${_csrf != null}" type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button class="btn btn-success btn-sm">Approve</button>
                            </form>
                            <form th:action="@{|/teacher/requests/${r.id}/decline|}" method="post" class="d-inline ms-1">
                                <input th:if="${_csrf != null}" type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button class="btn btn-outline-danger btn-sm">Decline</button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <div class="d-flex align-items-center justify-content-between">
                <h5 class="card-title mb-3">Retake Requests</h5>
                <span class="badge bg-secondary"
                      th:text="${(retakeRequests != null) ? #lists.size(retakeRequests) : 0}">0</span>
            </div>

            <div class="alert alert-info"
                 th:if="${retakeRequests == null or #lists.isEmpty(retakeRequests)}">
                No pending retake requests.
            </div>

            <div class="table-responsive"
                 th:if="${retakeRequests != null and !#lists.isEmpty(retakeRequests)}">
                <table class="table table-sm align-middle">
                    <thead>
                    <tr><th>Student</th><th>Quiz</th><th>Request ID</th><th class="text-end">Actions</th></tr>
                    </thead>
                    <tbody>
                    <tr th:each="r : ${retakeRequests}">
                        <td th:text="${(r != null && r.student != null) ? r.student.username : '—'}">student1</td>
                        <td th:text="${(r != null && r.quiz != null) ? r.quiz.title : '—'}">Quiz</td>
                        <td th:text="${(r != null) ? r.id : ''}">—</td>
                        <td class="text-end">
                            <form th:action="@{|/teacher/retakes/${r.id}/approve|}" method="post" class="d-inline">
                                <input th:if="${_csrf != null}" type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button class="btn btn-success btn-sm">Approve</button>
                            </form>
                            <form th:action="@{|/teacher/retakes/${r.id}/decline|}" method="post" class="d-inline ms-1">
                                <input th:if="${_csrf != null}" type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button class="btn btn-outline-danger btn-sm">Decline</button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
