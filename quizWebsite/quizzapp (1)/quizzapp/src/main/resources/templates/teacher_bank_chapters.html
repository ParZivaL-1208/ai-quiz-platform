<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Question Bank Folders — Quiz App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8fafc; }
        .page { max-width: 1100px; margin: 24px auto; }
        .folder-card { transition: transform 0.2s, box-shadow 0.2s; text-decoration: none; color: inherit; }
        .folder-card:hover { transform: translateY(-3px); box-shadow: 0 .5rem 1rem rgba(0,0,0,.15)!important; }
        .folder-icon { color: #ffc107; font-size: 2rem; margin-right: 15px; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">Quiz App</a>
        <div class="ms-auto"><a class="btn btn-light btn-sm" href="/teacher">Back to Dashboard</a></div>
    </div>
</nav>

<main class="page">
    <h1 class="h3 fw-bold mb-4">Question Bank Directories</h1>

    <div class="alert alert-warning" th:if="${#lists.isEmpty(chapters)}">
        Your question bank is empty. Create a quiz to populate the bank.
    </div>

    <div class="row g-3">
        <div class="col-md-6 col-lg-4" th:each="chapter : ${chapters}">
            <a th:href="@{/teacher/bank/chapter(name=${chapter})}" class="card shadow-sm folder-card d-block h-100 p-3">
                <div class="d-flex align-items-center">
                    <div class="folder-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="currentColor" class="bi bi-folder-fill" viewBox="0 0 16 16">
                            <path d="M9.828 3h3.982a2 2 0 0 1 1.992 2.181l-.637 7A2 2 0 0 1 13.174 14H2.825a2 2 0 0 1-1.991-1.819l-.637-7a1.99 1.99 0 0 1 .342-1.31L.5 3a2 2 0 0 1 2-2h3.672a2 2 0 0 1 1.414.586l.828.828A2 2 0 0 0 9.828 3zm-8.322.12C1.72 3.042 1.95 3 2.19 3h5.396l-.707-.707A1 1 0 0 0 6.172 2H2.5a1 1 0 0 0-1 .981z"/>
                        </svg>
                    </div>
                    <div>
                        <h6 class="mb-0 fw-bold" th:text="${chapter}">Chapter Name</h6>
                    </div>
                </div>
            </a>
        </div>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
