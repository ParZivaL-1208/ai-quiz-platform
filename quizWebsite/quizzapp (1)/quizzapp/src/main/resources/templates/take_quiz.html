<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${quiz.title}">Take Quiz</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body{background:#f8fafc}.page{max-width:900px;margin:24px auto}</style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">Quiz App</a>
        <div class="ms-auto"><a class="btn btn-outline-light btn-sm" href="/logout">Logout</a></div>
    </div>
</nav>

<main class="page">
    <h1 class="h4 fw-bold mb-3" th:text="${quiz.title}">Quiz Title</h1>

    <form th:action="@{|/student/quiz/${attemptId}/submit|}" method="post" class="d-grid gap-3">
        <input th:if="${_csrf != null}" type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="card shadow-sm" th:each="q,qi : ${quiz.questions}">
            <div class="card-body">
                <h6 class="fw-semibold mb-3">
                    <span class="me-2 badge bg-secondary" th:text="${qi.index + 1}">1</span>
                    <span th:text="${q.text}">Question text</span>
                </h6>

                <div class="list-group">
                    <label class="list-group-item" th:each="opt : ${q.options}">
                        <input class="form-check-input me-2" type="radio"
                               th:name="${'q_' + q.id}" th:value="${opt.id}" required />
                        <span th:text="${opt.text}">Option</span>
                    </label>
                </div>
            </div>
        </div>

        <div>
            <button class="btn btn-primary">Submit</button>
            <a href="/student" class="btn btn-outline-secondary">Cancel</a>
        </div>
    </form>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
