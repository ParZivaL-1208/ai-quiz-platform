<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chapter Questions — Quiz App</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f8fafc; }
    .page { max-width: 900px; margin: 24px auto; }
    .option-item { padding: 4px 8px; margin-bottom: 4px; border-radius: 4px; }
    .correct-option { background-color: #d1e7dd; color: #0f5132; font-weight: 600; border-left: 4px solid #198754; }
    .incorrect-option { color: #6c757d; }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/">Quiz App</a>
    <div class="ms-auto">
      <a class="btn btn-light btn-sm me-2" href="/teacher/bank">Back to Folders</a>
      <a class="btn btn-outline-light btn-sm" href="/teacher">Dashboard</a>
    </div>
  </div>
</nav>

<main class="page">
  <div class="d-flex align-items-center mb-4 pb-2 border-bottom">
    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="#ffc107" class="bi bi-folder-fill me-3" viewBox="0 0 16 16">
      <path d="M9.828 3h3.982a2 2 0 0 1 1.992 2.181l-.637 7A2 2 0 0 1 13.174 14H2.825a2 2 0 0 1-1.991-1.819l-.637-7a1.99 1.99 0 0 1 .342-1.31L.5 3a2 2 0 0 1 2-2h3.672a2 2 0 0 1 1.414.586l.828.828A2 2 0 0 0 9.828 3zm-8.322.12C1.72 3.042 1.95 3 2.19 3h5.396l-.707-.707A1 1 0 0 0 6.172 2H2.5a1 1 0 0 0-1 .981z"/>
    </svg>
    <h1 class="h3 fw-bold mb-0" th:text="${chapterName}">Chapter Name</h1>
  </div>

  <div th:if="${message}" class="alert alert-success mb-4" th:text="${message}"></div>

  <div class="card shadow-sm mb-5 border-primary">
    <div class="card-body bg-light">
      <h5 class="fw-bold mb-3 text-primary">+ Add New Question to this Chapter</h5>
      <form th:action="@{/teacher/bank/add-question}" method="post">
        <input th:if="${_csrf != null}" type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <input type="hidden" name="chapter" th:value="${chapterName}"/>

        <div class="mb-3">
          <input class="form-control" name="text" placeholder="Type the question text here..." required>
        </div>
        <div class="row g-2 mb-3">
          <div class="col-md-3"><input class="form-control" name="optionA" placeholder="Option A" required></div>
          <div class="col-md-3"><input class="form-control" name="optionB" placeholder="Option B" required></div>
          <div class="col-md-3"><input class="form-control" name="optionC" placeholder="Option C" required></div>
          <div class="col-md-3"><input class="form-control" name="optionD" placeholder="Option D" required></div>
        </div>
        <div class="d-flex align-items-center gap-2">
          <label class="form-label mb-0 fw-semibold text-nowrap">Correct Option:</label>
          <select class="form-select w-auto" name="correct" required>
            <option value="A">A</option>
            <option value="B">B</option>
            <option value="C">C</option>
            <option value="D">D</option>
          </select>
          <button class="btn btn-success ms-auto" type="submit">Add to Bank</button>
        </div>
      </form>
    </div>
  </div>

  <div class="alert alert-warning" th:if="${#lists.isEmpty(questions)}">
    No questions found in this chapter.
  </div>

  <div class="card shadow-sm mb-3 border-secondary" th:each="q, stat : ${questions}">
    <div class="card-body">
      <div class="d-flex justify-content-between align-items-start">

        <div class="flex-grow-1">
          <p class="fw-bold mb-3" th:text="${stat.count + '. ' + q.text}">1. Question Text</p>

          <ul class="list-unstyled mb-0 ms-2">
            <li th:each="opt : ${q.options}"
                class="option-item"
                th:classappend="${opt.correct} ? 'correct-option' : 'incorrect-option'">

              <span th:if="${opt.correct}">✓</span>
              <span th:unless="${opt.correct}">○</span>
              <span class="ms-1" th:text="${opt.text}">Option Text</span>
              <span th:if="${opt.correct}" class="badge bg-success ms-2">Correct Answer</span>
            </li>
          </ul>
        </div>

        <div class="ms-3">
          <form th:action="@{|/teacher/bank/question/${q.id}/delete|}" method="post"
                onsubmit="return confirm('Are you sure you want to permanently delete this question from the bank?');">
            <input th:if="${_csrf != null}" type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn btn-sm btn-outline-danger">Delete</button>
          </form>
        </div>

      </div>
    </div>
  </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
